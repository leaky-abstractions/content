<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Leaky Abstractions — Logo Render</title>
        <style>
            @font-face {
                font-family: 'JetBrains Mono';
                font-weight: 400;
                font-style: normal;
                font-display: block;
                src: url('./fonts/JetBrainsMono-Regular.woff2') format('woff2');
            }
            @font-face {
                font-family: 'JetBrains Mono';
                font-weight: 700;
                font-style: normal;
                font-display: block;
                src: url('./fonts/JetBrainsMono-Bold.woff2') format('woff2');
            }
            html,
            body {
                margin: 0;
                padding: 0;
                width: 800px;
                height: 800px;
                background: transparent;
                font-family: 'JetBrains Mono', monospace;
            }
            .logo {
                width: 800px;
                height: 800px;
                display: block;
            }
        </style>
    </head>
    <body>
        <object class="logo" type="image/svg+xml" data="logo-square.svg"></object>
    </body>
</html>
