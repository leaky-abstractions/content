name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # Schema validation + unit tests (fast, no external deps)
    validate:
        name: Validate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
            - run: bun install --frozen-lockfile
            - run: bun cli validate
            - run: bun test

    # TypeScript type-check
    typecheck:
        name: Type-check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
            - run: bun install --frozen-lockfile
            - run: bunx tsc --noEmit --project tsconfig.json

    # Render brand assets (proves headless Firefox + render lib + brand pages work)
    render:
        name: Render brand
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
            - uses: browser-actions/setup-firefox@v1
              with:
                  firefox-version: latest-esr
            - run: bun install --frozen-lockfile
            - run: bun cli render brand --out=./tmp/brand

    # Build the eleventy site (also catches prebuild=validate regressions)
    build:
        name: Build site
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
            - run: bun install --frozen-lockfile
            - run: bun run build

    # Channel diff (informational; NOT in the ci-success gate).
    # Runs only on same-repo PRs — forks can't read secrets.
    diff:
        name: Channel diff (preview)
        runs-on: ubuntu-latest
        needs: [validate, render]
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
            - uses: browser-actions/setup-firefox@v1
              with:
                  firefox-version: latest-esr
            - run: bun install --frozen-lockfile
            - run: bun cli render brand --out=./tmp/brand
            - run: bun cli youtube channel diff
        env:
            YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
            YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
            YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

    # Single required check for branch protection rules.
    # Depends on blocking jobs only; diff failure does NOT block merge.
    # `re-actors/alls-green` inspects every job in `needs` via toJSON(needs)
    # and fails if any is not "success" — so adding a new blocking job is
    # a one-line edit to `needs:` here, with no second place to update.
    ci-success:
        name: CI Success
        runs-on: ubuntu-latest
        needs: [validate, typecheck, render, build]
        if: always()
        steps:
            - uses: re-actors/alls-green@release/v1
              with:
                  jobs: ${{ toJSON(needs) }}
